# Lab Invoice Manager — local dev infra
# Run from the repo root: `npm run infra:up` (or `docker compose -f infra/docker-compose.yml up -d`)
#
# Services:
#   postgres   : Postgres 15 (mirrors AWS RDS target)
#   minio      : S3-compatible object storage for local PDF uploads
#   minio-init : one-shot job that creates the dev bucket on first run
#   extractor  : FastAPI service wrapping the production-tested extract_invoice.py

services:
  postgres:
    image: postgres:15-alpine
    container_name: lim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lim
      POSTGRES_PASSWORD: lim_dev_password
      POSTGRES_DB: lim_dev
    ports:
      - '5432:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lim -d lim_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lim-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: lim-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/dsd-lim-dev &&
      mc anonymous set none local/dsd-lim-dev &&
      echo 'Bucket dsd-lim-dev ready.'
      "

  extractor:
    build:
      context: ../extractor
    container_name: lim-extractor
    restart: unless-stopped
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
