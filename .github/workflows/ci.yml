name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
        env:
          # Run Node 24 inside the action wrapper. Removes the deprecation
          # warning emitted as GitHub migrates the runner default away from
          # Node 20 in mid-2026. Has no effect on the Node version actually
          # used to run our app — that's set by `node-version` above.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - run: npm ci

      - run: npx prisma generate

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
        env:
          # Build needs *some* env values; never use these for real.
          DATABASE_URL: 'postgresql://lim:lim@localhost:5432/lim_ci?schema=public'
          SESSION_SECRET: 'ci_only_session_secret_value_at_least_32_chars_long_xx'
          APP_ENCRYPTION_KEY_DEV: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
          PATIENT_SEARCH_HMAC_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
          S3_ENDPOINT: 'http://localhost:9000'
          S3_REGION: 'eu-west-2'
          S3_ACCESS_KEY_ID: 'minioadmin'
          S3_SECRET_ACCESS_KEY: 'minioadmin'
          S3_BUCKET: 'dsd-lim-ci'
          NEXT_PUBLIC_APP_NAME: 'DSD Lab Invoice Manager'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
